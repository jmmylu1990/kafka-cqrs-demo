server:
  port: 8081 # 1. 設定 Spring Boot 埠口為 8081

spring:
  application:
    name: kafka-cqrs-demo
  # ==========================================
  # 1. 資料庫連線 (Datasource Configuration)
  # ==========================================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # ==========================================
  # 2. JPA & Hibernate 設定
  # ==========================================
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ==========================================
  # 3. Kafka 分散式佇列設定
  # ==========================================
  kafka:
    bootstrap-servers: localhost:9092

    # 讀取端 Consumer 設定
    consumer:
      group-id: my-cqrs-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    # 寫入端 Producer 設定
    # 寫入端 Producer 設定
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

      # 1. 隸屬於 producer 層級
      ack: all
      retries: 3

      # 2. 原生屬性容器層級
      properties:
        # 🟢 【這次真的改了！】這裡必須縮進 4 個空格 (比 properties 多 2 格)
        enable.idempotence: true

        # 🟢 【核心大修正】因為含有點點 (.)，必須用雙引號包起來，否則 Spring 語法解析會壞掉！
        "max.in.flight.requests.per.connection": 5